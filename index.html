<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>참석자 명단 서명</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f4f9; }
        .container { background-color: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input[type="text"] { width: 90%; padding: 10px; margin: 5px 0 15px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        canvas { border: 2px solid #333; background-color: #fafafa; touch-action: none; margin-bottom: 15px; width: 100%; height: 150px; border-radius: 5px; }
        .btn { padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; width: 45%; color: white; font-weight: bold; }
        .btn-clear { background-color: #ff4d4d; }
        .btn-submit { background-color: #4CAF50; }
    </style>
</head>
<body>

<div class="container">
    <h2>조회 참석 서명</h2>
    
    <div style="text-align: left; padding-left: 5%;">
        <label>부서명</label><br>
        <input type="text" id="department" placeholder="예: 조립팀">
        <br>
        <label>성명</label><br>
        <input type="text" id="employeeName" placeholder="성함 입력">
    </div>
    
    <p style="text-align: left; padding-left: 5%; margin-bottom: 5px; font-weight: bold;">서명 (아래 빈칸에 서명하세요)</p>
    <canvas id="sigCanvas"></canvas>
    <br>
    
    <button class="btn btn-clear" id="clearBtn">다시 쓰기</button>
    <button class="btn btn-submit" id="submitBtn">제출하기</button>
</div>

<script>
    const canvas = document.getElementById('sigCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // 캔버스 크기 조정 (화면에 맞게)
    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    };

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.lineWidth = 3; ctx.lineCap = 'round'; draw(e); });
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; ctx.lineWidth = 3; ctx.lineCap = 'round'; draw(e); }, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    window.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });

    document.getElementById('clearBtn').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    document.getElementById('submitBtn').addEventListener('click', () => {
        const dept = document.getElementById('department').value;
        const name = document.getElementById('employeeName').value;
        if (!dept || !name) { alert('부서명과 성명을 모두 입력해주세요!'); return; }

        const dataURL = canvas.toDataURL('image/png');
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = '처리 중...';
        submitBtn.disabled = true;

        // ★ 알려주신 최신 구글 서버 주소가 적용된 부분입니다! ★
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_nToBKByiLzffBnDoLKmjbadbAHv8dCEtxOIm1YbaX3jE7QvHxk1zjIuXZin1cvAFyA/exec';

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                department: dept,
                name: name,
                signature: dataURL
            })
        })
        .then(() => {
            alert(`${name}님, 서명이 완료되었습니다.`);
            // 성공 후 입력창 초기화
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('department').value = '';
            document.getElementById('employeeName').value = '';
        })
        .catch(() => alert('오류가 발생했습니다. 인터넷 연결을 확인해주세요.'))
        .finally(() => { submitBtn.innerText = '제출하기'; submitBtn.disabled = false; });
    });
</script>
</body>
</html>
