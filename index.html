<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교육 참석 서명</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f4f9; position: relative; }
        .container { background-color: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; }
        input[type="text"] { width: 90%; padding: 10px; margin: 5px 0 15px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        input[readonly] { background-color: #e9ecef; color: #495057; font-weight: bold; } /* 회색 잠금창 디자인 */
        canvas { border: 2px solid #333; background-color: #fafafa; touch-action: none; margin-bottom: 15px; width: 100%; height: 150px; border-radius: 5px; }
        .btn { padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; width: 45%; color: white; font-weight: bold; }
        .btn-clear { background-color: #ff4d4d; }
        .btn-submit { background-color: #4CAF50; }
        
        /* ⚙️ 관리자 마감 버튼 (오른쪽 위 구석) */
        .admin-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-btn" id="adminBtn">⚙️</button>

    <h2>교육 참석 서명</h2>
    
    <div style="text-align: left; padding-left: 5%;">
        <label>교육명</label><br>
        <input type="text" id="trainingName" placeholder="예: 4월 정기 교육">
        <br>
        <label>부서명</label><br>
        <input type="text" id="department" placeholder="예: 조립팀">
        <br>
        <label>성명</label><br>
        <input type="text" id="employeeName" placeholder="성함 입력">
    </div>
    
    <p style="text-align: left; padding-left: 5%; margin-bottom: 5px; font-weight: bold;">서명</p>
    <canvas id="sigCanvas"></canvas>
    <br>
    <button class="btn btn-clear" id="clearBtn">다시 쓰기</button>
    <button class="btn btn-submit" id="submitBtn">제출하기</button>
</div>

<script>
    // ★ 관리자님의 구글 서버 주소 (손대지 마세요!) ★
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_nToBKByiLzffBnDoLKmjbadbAHv8dCEtxOIm1YbaX3jE7QvHxk1zjIuXZin1cvAFyA/exec';

    // 1. 스마트 QR 기능: 접속하자마자 교육명을 자동으로 적고 잠가버림
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const eduParam = urlParams.get('edu'); 
        if (eduParam) {
            document.getElementById('trainingName').value = eduParam;
            document.getElementById('trainingName').readOnly = true; 
        }
    };

    // 2. 캔버스(서명 도화지) 그리기 기능
    const canvas = document.getElementById('sigCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    function resizeCanvas() { canvas.width = canvas.getBoundingClientRect().width; canvas.height = 150; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    const getPos = (e) => { const rect = canvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top }; };
    const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.lineWidth = 3; draw(e); }); canvas.addEventListener('mousemove', draw); window.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; ctx.lineWidth = 3; draw(e); }, {passive: false}); canvas.addEventListener('touchmove', draw, {passive: false}); window.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });
    document.getElementById('clearBtn').addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));

    // 3. 직원이 [제출하기]를 눌렀을 때 (서명 저장 명령)
    document.getElementById('submitBtn').addEventListener('click', () => {
        const training = document.getElementById('trainingName').value;
        const dept = document.getElementById('department').value;
        const name = document.getElementById('employeeName').value;
        if (!training || !dept || !name) { alert('빈칸을 모두 채워주세요!'); return; }

        const dataURL = canvas.toDataURL('image/png');
        const btn = document.getElementById('submitBtn'); btn.innerText = '처리 중...'; btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "sign", trainingName: training, department: dept, name: name, signature: dataURL })
        }).then(() => {
            alert(`${name}님, 서명 완료!`);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('department').value = ''; document.getElementById('employeeName').value = '';
        }).finally(() => { btn.innerText = '제출하기'; btn.disabled = false; });
    });

    // 4. 관리자가 톱니바퀴[⚙️]를 눌렀을 때 (마감 및 PDF 발송 명령)
    document.getElementById('adminBtn').addEventListener('click', () => {
        const training = document.getElementById('trainingName').value;
        if (!training) { alert('진행 중인 교육명이 없습니다.'); return; }

        const password = prompt('관리자 비밀번호를 입력하세요:');
        if (password !== '1234') { if(password !== null) alert('비밀번호가 틀렸습니다.'); return; }

        if(confirm(`[${training}] 교육을 마감하고 PDF 보고서를 이메일로 전송하시겠습니까?`)) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: "makePDF", trainingName: training })
            }).then(() => {
                alert('완료! 구글 드라이브 저장 및 이메일 발송이 완료되었습니다.');
            }).catch(() => alert('오류가 발생했습니다.'));
        }
    });
</script>
</body>
</html>
